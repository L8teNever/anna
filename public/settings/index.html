<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6750a4" />
  <title>Einstellungen – Anna</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <header class="app-topbar">
    <button class="m3-icon-button" id="back-button" aria-label="Zurück" title="Zurück">←</button>
    <h1 class="game-topbar__title">Einstellungen</h1>
  </header>

  <main class="app-content">
    <section class="settings-section">
      <h2 class="m3-title">Darstellung</h2>
      <div class="settings-row">
        <div class="settings-row__label">
          <span class="settings-row__title">Design</span>
          <span class="settings-row__hint">Hell, dunkel oder wie im Systemmodus</span>
        </div>
        <div class="m3-segmented" id="theme-segmented" role="group" aria-label="Design wählen">
          <button type="button" class="m3-segmented__option" data-value="system">Auto</button>
          <button type="button" class="m3-segmented__option" data-value="light">Hell</button>
          <button type="button" class="m3-segmented__option" data-value="dark">Dunkel</button>
        </div>
      </div>
    </section>

    <section class="settings-section">
      <h2 class="m3-title">Spiele</h2>
      <div class="settings-row">
        <div class="settings-row__label">
          <span class="settings-row__title">Sound</span>
          <span class="settings-row__hint">Ton-Effekte in den Spielen (z.B. Ticken)</span>
        </div>
        <label class="m3-switch">
          <input type="checkbox" id="sound-toggle" />
          <span class="m3-switch__track"></span>
        </label>
      </div>
      <div class="settings-row">
        <div class="settings-row__label">
          <span class="settings-row__title">Vibration</span>
          <span class="settings-row__hint">Vibriert z.B. wenn die Bombe hochgeht</span>
        </div>
        <label class="m3-switch">
          <input type="checkbox" id="vibration-toggle" />
          <span class="m3-switch__track"></span>
        </label>
      </div>
    </section>

    <section class="settings-section">
      <h2 class="m3-title">App</h2>
      <div class="settings-row">
        <div class="settings-row__label">
          <span class="settings-row__title">Nach Updates suchen</span>
          <span class="settings-row__hint">Prüft, ob eine neue Version verfügbar ist</span>
        </div>
        <button class="m3-button m3-button--tonal" id="update-check-button">Prüfen</button>
      </div>
    </section>
  </main>

  <script src="/js/storage.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/pwa-helper.js"></script>
</body>
</html>
