<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#386a20" />
  <title>Kategorien – Anna</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/games/categories/categories.css" />
</head>
<body>
  <script src="/js/icons.js"></script>
  <div class="game-shell">
    <header class="game-topbar">
      <button class="m3-icon-button" id="back-button" aria-label="Zurück" title="Zurück">
        <svg class="m3-icon"><use href="#icon-arrow-back"></use></svg>
      </button>
      <h1 class="game-topbar__title">
        <svg class="m3-icon" style="vertical-align: -5px"><use href="#icon-grid"></use></svg>
        Kategorien
      </h1>
    </header>

    <!-- ---------- Setup-Ansicht ---------- -->
    <section class="game-view" id="setup-view">
      <div class="setup-grid">
        <div class="setup-grid__left">
          <h2 class="m3-title game-section-title">Mitspieler</h2>
          <p class="m3-body">Anhaken, wer mitspielt – neue Spieler bleiben auch für andere Spiele gespeichert.</p>
          <div class="player-picker" id="player-picker"></div>
        </div>
        <div class="setup-grid__right">
          <h2 class="m3-title game-section-title">Zeit pro Kategorie</h2>
          <div class="player-input-row" style="margin-top: 12px">
            <input type="number" id="seconds-input" min="10" max="120" step="5" aria-label="Sekunden pro Kategorie" />
            <span class="m3-body" style="align-self: center">Sekunden</span>
          </div>
        </div>
      </div>

      <div class="game-bottom-bar">
        <button type="button" class="m3-button m3-button--filled" id="start-button">Spiel starten</button>
      </div>
    </section>

    <!-- ---------- Spiel-Ansicht ---------- -->
    <section class="game-view" id="play-view" hidden>
      <div class="game-play">
        <div class="cat-card">
          <p class="m3-label">KATEGORIE</p>
          <p class="m3-headline" id="cat-name">–</p>
          <p class="m3-label" style="margin-top: 16px">BUCHSTABE</p>
          <p class="cat-letter" id="cat-letter">–</p>
        </div>
        <div class="timer-container">
          <svg class="progress-ring" width="120" height="120">
            <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.06)" stroke-width="8" fill="transparent" r="52" cx="60" cy="60"/>
            <circle class="progress-ring__circle" stroke="var(--m3-primary)" stroke-width="8" fill="transparent" r="52" cx="60" cy="60"/>
          </svg>
          <div class="timer-text" id="cat-timer">30</div>
        </div>
      </div>
      <div class="game-bottom-bar" id="next-round-bar" hidden>
        <button type="button" class="m3-button m3-button--filled" id="next-round-button">Nächste Kategorie</button>
        <button type="button" class="m3-button m3-button--text" id="exit-button" style="margin-top: 8px">
          Zur Startseite
        </button>
      </div>
    </section>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/player-picker.js"></script>
  <script src="/js/wake-lock.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/games/categories/categories.js"></script>
  <script src="/js/pwa-helper.js"></script>
</body>
</html>
