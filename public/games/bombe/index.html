<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b3261e" />
  <title>Tickende Bombe – Anna</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/games/bombe/bombe.css" />
</head>
<body>
  <script src="/js/icons.js"></script>
  <div class="game-shell">
    <header class="game-topbar">
      <button class="m3-icon-button" id="back-button" aria-label="Zurück" title="Zurück">
        <svg class="m3-icon"><use href="#icon-arrow-back"></use></svg>
      </button>
      <h1 class="game-topbar__title">
        <svg class="m3-icon" style="vertical-align: -5px"><use href="#icon-bomb"></use></svg>
        Tickende Bombe
      </h1>
    </header>

    <!-- ---------- Setup-Ansicht ---------- -->
    <section class="game-view" id="setup-view">
      <h2 class="m3-title game-section-title">Mitspieler (optional)</h2>
      <p class="m3-body">Nur für die Übersicht – die Bombe wird trotzdem einfach im Kreis weitergereicht.</p>
      <div class="player-input-row">
        <input type="text" id="player-name-input" placeholder="Name hinzufügen…" maxlength="20" />
        <button type="button" class="m3-button m3-button--tonal" id="add-player-button" aria-label="Spieler hinzufügen">
          <svg class="m3-icon"><use href="#icon-add"></use></svg>
        </button>
      </div>
      <div class="player-chips" id="player-chips"></div>

      <h2 class="m3-title game-section-title">Zünddauer</h2>
      <p class="m3-body">Zufällige Zeit zwischen den beiden Werten – keiner weiß, wann es knallt.</p>
      <div class="player-input-row" style="margin-top: 12px">
        <input type="number" id="min-seconds-input" min="5" max="600" step="5" aria-label="Minimum Sekunden" />
        <input type="number" id="max-seconds-input" min="5" max="600" step="5" aria-label="Maximum Sekunden" />
      </div>

      <div class="game-bottom-bar">
        <button type="button" class="m3-button m3-button--filled" id="start-button">Bombe starten</button>
      </div>
    </section>

    <!-- ---------- Spiel-Ansicht ---------- -->
    <section class="game-view" id="play-view" hidden>
      <div class="game-play">
        <div class="bomb-ring" id="bomb-ring">
          <svg class="m3-icon bomb-ring__icon" id="bomb-icon"><use href="#icon-bomb"></use></svg>
        </div>
        <p class="m3-title" id="play-status">Gib das Handy weiter…</p>
      </div>
      <div class="game-bottom-bar" id="play-actions" hidden>
        <button type="button" class="m3-button m3-button--filled" id="restart-button">Neue Runde</button>
        <button type="button" class="m3-button m3-button--text" id="exit-button" style="margin-top: 8px">
          Zur Startseite
        </button>
      </div>
    </section>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/wake-lock.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/games/bombe/bombe.js"></script>
  <script src="/js/pwa-helper.js"></script>
</body>
</html>
