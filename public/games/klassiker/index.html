<!doctype html>
<html lang="de">
<head>
  <meta name="cf-worker-bypass" content="true" />
  <meta charset="utf-8" />
  <meta name="cf-cache-bust" content="true" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1014" />
  <title>Klassiker – Anna</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/games/klassiker/klassiker.css" />
  <link rel="stylesheet" href="/games/klassiker/tictactoe.css" />
  <link rel="stylesheet" href="/games/klassiker/connect4.css" />
  <!-- Session-globale Scripts, siehe router.js -->
  <script src="/js/icons.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/page-transition.js"></script>
  <script src="/js/pwa-helper.js"></script>
  <script src="/js/pwa-install.js"></script>
</head>
<body>
  <div class="game-shell">
    <header class="game-topbar" id="game-topbar">
      <button class="m3-icon-button" id="back-button" aria-label="Zurück" title="Zurück">
        <svg class="m3-icon"><use href="#icon-arrow-back"></use></svg>
      </button>
      <h1 class="game-topbar__title">
        <svg class="m3-icon" style="vertical-align: -5px"><use href="#icon-dice"></use></svg>
        <span id="klassiker-title">Klassiker</span>
      </h1>
    </header>

    <!-- ---------- Hub: Übersicht aller Untergames ---------- -->
    <section class="game-view app-view" id="hub-view">
      <div class="game-detail-card">
        <div class="game-detail-card__top">
          <span class="m3-tag" style="background: var(--game-amber-container); color: var(--game-amber)">Brettspiele</span>
          <span class="game-detail-card__limit">2 Spieler</span>
        </div>
        <p class="m3-body">
          Wähle einen Klassiker aus der Liste – abwechselnd auf einem Gerät spielen, direkt loslegen.
        </p>
      </div>

      <div class="klassiker-hub-grid" id="klassiker-hub-grid">
        <!-- Untergame-Kacheln werden per JS aus window.KlassikerGames gerendert -->
      </div>
    </section>

    <!-- ---------- Spiel-Ansicht: generische Bühne, die das gewählte
         Untergame per mount() selbst befüllt (siehe klassiker.js) ---------- -->
    <section class="game-view app-view" id="subgame-view" hidden>
      <div class="klassiker-subgame-stage" id="klassiker-subgame-stage"></div>
    </section>
  </div>

  <!-- Sieg-Welle: kurze volle Bildschirm-Welle beim Gewinnen, Farbe/Text
       kommen vom jeweiligen Untergame (siehe window.KlassikerHub.playWinWave
       in klassiker.js) - so bleibt dieser Effekt für künftige Untergames
       einfach mitnutzbar, ohne dass sie ihn selbst bauen müssen. -->
  <div class="klassiker-win-wave" id="klassiker-win-wave" hidden>
    <div class="klassiker-win-wave__fill"></div>
    <p class="klassiker-win-wave__label" id="klassiker-win-wave-label"></p>
  </div>

  <script src="/js/version.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/game-registry.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/ripple.js"></script>
  <script src="/js/view-nav.js"></script>
  <script src="/js/confirm-dialog.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/js/touch-fixes.js"></script>
  <!-- Untergame-Module: registrieren sich selbst in window.KlassikerGames
       (siehe Kommentar in klassiker.js) - neue Untergames werden einfach
       hier als weiteres <script> ergänzt, ohne klassiker.js anzufassen. -->
  <script src="/games/klassiker/tictactoe.js"></script>
  <script src="/games/klassiker/connect4.js"></script>
  <script src="/games/klassiker/klassiker.js"></script>
  <script src="/js/privacy-banner.js"></script>
</body>
</html>
