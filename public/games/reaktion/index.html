<!doctype html>
<html lang="de">
<head>
  <meta name="cf-worker-bypass" content="true" />
  <meta charset="utf-8" />
  <meta name="cf-cache-bust" content="true" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1014" />
  <title>Reaktionsspiele – Anna</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/games/reaktion/reaktion.css" />
  <link rel="stylesheet" href="/games/reaktion/reflex.css" />
  <link rel="stylesheet" href="/games/reaktion/stopuhr.css" />
  <!-- Session-globale Scripts, siehe router.js -->
  <script src="/js/icons.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/page-transition.js"></script>
  <script src="/js/pwa-helper.js"></script>
  <script src="/js/pwa-install.js"></script>
</head>
<body>
  <div class="game-shell">
    <header class="game-topbar" id="game-topbar">
      <button class="m3-icon-button" id="back-button" aria-label="Zurück" title="Zurück">
        <svg class="m3-icon"><use href="#icon-arrow-back"></use></svg>
      </button>
      <h1 class="game-topbar__title">
        <svg class="m3-icon" style="vertical-align: -5px"><use href="#icon-stopwatch"></use></svg>
        <span id="reaktion-title">Reaktionsspiele</span>
      </h1>
    </header>

    <!-- ---------- Hub: Übersicht aller Untergames ---------- -->
    <section class="game-view app-view" id="hub-view">
      <div class="game-detail-card">
        <div class="game-detail-card__top">
          <span class="m3-tag" style="background: var(--game-green-container); color: var(--game-green)">Geschick</span>
          <span class="game-detail-card__limit">1+ Spieler</span>
        </div>
        <p class="m3-body">
          Wähle ein Reaktionsspiel aus der Liste – Handy reihum geben und schauen, wer die schnellsten Finger oder das beste Zeitgefühl hat.
        </p>
      </div>

      <div class="reaktion-hub-grid" id="reaktion-hub-grid">
        <!-- Untergame-Kacheln werden per JS aus window.ReaktionGames gerendert -->
      </div>
    </section>

    <!-- ---------- Spiel-Ansicht: generische Bühne, die das gewählte
         Untergame per mount() selbst befüllt (siehe reaktion.js) ---------- -->
    <section class="game-view app-view" id="subgame-view" hidden>
      <div class="reaktion-subgame-stage" id="reaktion-subgame-stage"></div>
    </section>
  </div>

  <script src="/js/version.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/game-registry.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/ripple.js"></script>
  <script src="/js/view-nav.js"></script>
  <script src="/js/confirm-dialog.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/js/touch-fixes.js"></script>
  <!-- Untergame-Module: registrieren sich selbst in window.ReaktionGames
       (siehe Kommentar in reaktion.js) - neue Untergames werden einfach
       hier als weiteres <script> ergänzt, ohne reaktion.js anzufassen. -->
  <script src="/games/reaktion/reflex.js"></script>
  <script src="/games/reaktion/stopuhr.js"></script>
  <script src="/games/reaktion/reaktion.js"></script>
  <script src="/js/privacy-banner.js"></script>
</body>
</html>
