<!doctype html>
<html lang="de">
<head>
  <meta name="cf-worker-bypass" content="true" />
  <meta charset="utf-8" />
  <meta name="cf-cache-bust" content="true" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1014" />
  <title>Perfekte Form – Anna</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/games/shapes/shapes.css" />
  <!-- Session-globale Scripts, siehe router.js -->
  <script src="/js/icons.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/page-transition.js"></script>
  <script src="/js/pwa-helper.js"></script>
  <script src="/js/pwa-install.js"></script>
</head>
<body>
  <div class="game-shell">
    <header class="game-topbar" id="game-topbar">
      <button class="m3-icon-button" id="back-button" aria-label="Zurück" title="Zurück">
        <svg class="m3-icon"><use href="#icon-arrow-back"></use></svg>
      </button>
      <h1 class="game-topbar__title">
        <svg class="m3-icon" style="vertical-align: -5px"><use href="#icon-shapes"></use></svg>
        Perfekte Form
      </h1>
    </header>

    <!-- ---------- Setup-Ansicht ---------- -->
    <section class="game-view app-view" id="setup-view">
      <div class="game-detail-card">
        <div class="game-detail-card__top">
          <span class="m3-tag" style="background: var(--game-orange-container); color: var(--game-orange)">Geschick</span>
          <span class="game-detail-card__limit">1+ Spieler</span>
        </div>
        <p class="m3-body">
          Wähle eine Form, zeichne sie so genau wie möglich mit dem Finger auf den
          Bildschirm und lass dir per Prozentzahl anzeigen, wie perfekt sie geworden ist.
          Reihum probieren – wer schafft die höchste Punktzahl?
        </p>
      </div>

      <div class="m3-segmented shape-select" id="shape-select" role="group" aria-label="Form wählen">
        <button type="button" class="m3-segmented__option" data-shape="circle" aria-pressed="true">
          <svg class="m3-icon"><use href="#icon-shape-circle"></use></svg> Kreis
        </button>
        <button type="button" class="m3-segmented__option" data-shape="rectangle">
          <svg class="m3-icon"><use href="#icon-shape-rectangle"></use></svg> Rechteck
        </button>
        <button type="button" class="m3-segmented__option" data-shape="triangle">
          <svg class="m3-icon"><use href="#icon-shape-triangle"></use></svg> Dreieck
        </button>
        <button type="button" class="m3-segmented__option" data-shape="star">
          <svg class="m3-icon"><use href="#icon-shape-star"></use></svg> Stern
        </button>
      </div>

      <div class="game-bottom-bar">
        <button type="button" class="m3-button m3-button--filled" id="start-button">
          <svg class="m3-icon" style="width: 18px; height: 18px"><use href="#icon-play"></use></svg> Form zeichnen
        </button>
      </div>
    </section>

    <!-- ---------- Spiel-Ansicht ---------- -->
    <section class="game-view app-view" id="play-view" hidden>
      <p class="shape-prompt" id="shape-prompt">Zeichne: <span id="shape-prompt-name">Kreis</span></p>

      <div class="shape-canvas-wrap">
        <canvas id="shape-canvas"></canvas>
        <div class="shape-result" id="shape-result" hidden>
          <p class="shape-result__score" id="shape-result-score">0%</p>
          <p class="shape-result__verdict" id="shape-result-verdict"></p>
        </div>
      </div>

      <div class="game-bottom-bar" id="draw-actions">
        <button type="button" class="m3-button m3-button--tonal" id="clear-button">
          <svg class="m3-icon" style="width: 18px; height: 18px"><use href="#icon-close"></use></svg> Löschen
        </button>
        <button type="button" class="m3-button m3-button--filled" id="evaluate-button" style="margin-top: 8px">
          <svg class="m3-icon" style="width: 18px; height: 18px"><use href="#icon-check"></use></svg> Fertig
        </button>
      </div>

      <div class="game-bottom-bar" id="result-actions" hidden>
        <button type="button" class="m3-button m3-button--filled" id="retry-button">Nochmal</button>
        <button type="button" class="m3-button m3-button--text" id="new-shape-button" style="margin-top: 8px">
          Neue Form
        </button>
      </div>
    </section>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/game-registry.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/ripple.js"></script>
  <script src="/js/view-nav.js"></script>
  <script src="/js/confirm-dialog.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/js/touch-fixes.js"></script>
  <script src="/games/shapes/shapes.js"></script>
  <script src="/js/privacy-banner.js"></script>
</body>
</html>
