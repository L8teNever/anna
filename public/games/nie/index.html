<!doctype html>
<html lang="de">
<head>
  <meta name="cf-worker-bypass" content="true" />
  <meta charset="utf-8" />
  <meta name="cf-cache-bust" content="true" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1014" />
  <title>Ich hab noch nie – Anna</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/games/nie/nie.css" />
</head>
<body>
  <script src="/js/icons.js"></script>
  <div class="game-shell">
    <header class="game-topbar" id="game-topbar">
      <button class="m3-icon-button" id="back-button" aria-label="Zurück" title="Zurück">
        <svg class="m3-icon"><use href="#icon-arrow-back"></use></svg>
      </button>
      <h1 class="game-topbar__title">
        <svg class="m3-icon" style="vertical-align: -5px"><use href="#icon-drink"></use></svg>
        Ich hab noch nie
      </h1>
    </header>

    <!-- ---------- Setup-Ansicht ---------- -->
    <section class="game-view app-view" id="setup-view">
      <div class="game-detail-card">
        <div class="game-detail-card__top">
          <span class="m3-tag" style="background: var(--game-green-container); color: var(--game-green)">Trinkspiel</span>
          <span class="game-detail-card__limit">2–20 Spieler</span>
        </div>
        <p class="m3-body">
          Der Reihe nach zeigt die App eine Aussage, die mit „Ich habe noch nie …“ beginnt. Wer das schon
          mal gemacht hat, trinkt, nimmt einen Schluck oder macht einen Finger runter – ganz wie ihr wollt.
        </p>
      </div>

      <button type="button" class="picker-launch-btn" id="open-category-select-button">
        <div class="picker-launch-btn__left">
          <div class="picker-launch-btn__icon"><svg class="m3-icon"><use href="#icon-grid"></use></svg></div>
          <div>
            <p class="picker-launch-btn__title">Themen-Kategorien</p>
            <p class="picker-launch-btn__hint" id="category-select-summary">Alle Kategorien aktiv</p>
          </div>
        </div>
        <svg class="m3-icon"><use href="#icon-chevron-right"></use></svg>
      </button>

      <div class="game-bottom-bar">
        <button type="button" class="m3-button m3-button--filled" id="start-button">
          <svg class="m3-icon" style="width: 18px; height: 18px"><use href="#icon-play"></use></svg> Runde starten
        </button>
      </div>
    </section>

    <!-- ---------- Kategorie-Auswahl (Vollbild) ---------- -->
    <section class="game-view app-view" id="view-category-select" data-hide-topbar hidden>
      <header class="picker-view-header">
        <div class="picker-view-header__left">
          <button type="button" class="m3-icon-button" id="category-select-back-button" aria-label="Zurück">
            <svg class="m3-icon"><use href="#icon-arrow-back"></use></svg>
          </button>
          <span class="picker-view-header__title">Themen-Kategorien</span>
        </div>
        <div class="picker-view-header__bulk">
          <button type="button" class="picker-view-header__bulk-btn picker-view-header__bulk-btn--primary" id="category-bulk-all">Alle</button>
          <div class="picker-view-header__divider"></div>
          <button type="button" class="picker-view-header__bulk-btn" id="category-bulk-none">Keine</button>
        </div>
      </header>

      <div id="categories-pool" style="display: flex; flex-direction: column; gap: 8px"></div>

      <div class="game-bottom-bar">
        <button type="button" class="m3-button m3-button--tonal" id="category-select-confirm-button">
          <svg class="m3-icon"><use href="#icon-check"></use></svg> Auswahl bestätigen
        </button>
      </div>
    </section>

    <!-- ---------- Spiel läuft: eine Aussage nach der anderen ---------- -->
    <section class="game-view app-view" id="play-view" hidden>
      <div class="nie-stage">
        <p class="nie-stage__eyebrow">Ich habe noch nie …</p>

        <div class="nie-card" id="nie-card">
          <p class="nie-card__text" id="nie-statement-text">…</p>
        </div>

        <p class="nie-stage__category" id="nie-category-label"></p>
      </div>

      <div class="game-bottom-bar">
        <button type="button" class="m3-button m3-button--filled" id="next-statement-button">
          <svg class="m3-icon" style="width: 18px; height: 18px"><use href="#icon-chevron-right"></use></svg> Nächste Aussage
        </button>
      </div>
    </section>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/js/game-registry.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/ripple.js"></script>
  <script src="/js/view-nav.js"></script>
  <script src="/js/confirm-dialog.js"></script>
  <script src="/js/category-picker.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/js/touch-fixes.js"></script>
  <script src="/games/nie/nie.js"></script>
  <script src="/js/privacy-banner.js"></script>
  <script src="/js/pwa-helper.js"></script>
</body>
</html>
