<!doctype html>
<html lang="de">
<head>
  <meta name="cf-worker-bypass" content="true" />
  <meta charset="utf-8" />
  <meta name="cf-cache-bust" content="true" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1014" />
  <title>Finger-Chooser – Anna</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/games/finger-chooser/finger-chooser.css" />
  <!-- Session-globale Scripts, siehe router.js -->
  <script src="/js/icons.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/page-transition.js"></script>
  <script src="/js/pwa-helper.js"></script>
  <script src="/js/pwa-install.js"></script>
</head>
<body>
  <div class="game-shell">
    <header class="game-topbar" id="game-topbar">
      <button class="m3-icon-button" id="back-button" aria-label="Zurück" title="Zurück">
        <svg class="m3-icon"><use href="#icon-arrow-back"></use></svg>
      </button>
      <h1 class="game-topbar__title">
        <svg class="m3-icon" style="vertical-align: -5px"><use href="#icon-touch"></use></svg>
        Finger-Chooser
      </h1>
      <button class="m3-icon-button fc-settings-trigger" id="fc-settings-button" aria-label="Einstellungen" title="Einstellungen">
        <svg class="m3-icon"><use href="#icon-sliders"></use></svg>
      </button>
    </header>

    <!-- ---------- Touch-Bühne: füllt den kompletten restlichen Bildschirm,
         damit überall Finger erkannt werden können ---------- -->
    <section class="game-view app-view fc-view" id="play-view">
      <div class="fc-instructions">
        <p class="fc-status" id="fc-status">Alle Finger gleichzeitig auf den Bildschirm legen…</p>
      </div>

      <div class="fc-surface" id="fc-surface"></div>
    </section>
  </div>

  <!-- Einstellungen: Auswahl-Modus (Gewinner/Teams) + einstellbare Anzahl -->
  <div class="m3-modal" id="fc-settings-modal" hidden>
    <div class="m3-modal__backdrop" data-fc-settings-backdrop></div>
    <div class="m3-modal__dialog" style="max-width: 340px">
      <h3 class="m3-modal__title">
        <svg class="m3-icon" style="width: 18px; height: 18px; color: var(--m3-primary)"><use href="#icon-sliders"></use></svg>
        Auswahl-Modus
      </h3>

      <div>
        <label class="m3-field-label">Wie soll ausgewählt werden?</label>
        <div class="m3-segmented" id="fc-mode-segmented" role="group" aria-label="Modus wählen" style="width: 100%">
          <button type="button" class="m3-segmented__option" data-mode="winners">Gewinner</button>
          <button type="button" class="m3-segmented__option" data-mode="teams">Teams</button>
        </div>
      </div>

      <div class="game-option-row">
        <span class="game-option-row__label" id="fc-count-label">Anzahl Gewinner</span>
        <div class="stepper" id="fc-count-stepper">
          <button type="button" class="m3-icon-button stepper__btn" id="fc-count-minus" aria-label="Weniger">
            <svg class="m3-icon" style="width: 18px; height: 18px"><use href="#icon-minus"></use></svg>
          </button>
          <span class="stepper__value" id="fc-count-value">1</span>
          <button type="button" class="m3-icon-button stepper__btn" id="fc-count-plus" aria-label="Mehr">
            <svg class="m3-icon" style="width: 18px; height: 18px"><use href="#icon-add"></use></svg>
          </button>
        </div>
      </div>

      <div class="m3-modal__actions">
        <button type="button" class="m3-button m3-button--filled" data-fc-settings-close style="width: 100%">
          Fertig
        </button>
      </div>
    </div>
  </div>

  <script src="/js/version.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/game-registry.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/ripple.js"></script>
  <script src="/js/audio.js"></script>
  <script src="/js/touch-fixes.js"></script>
  <script src="/games/finger-chooser/finger-chooser.js"></script>
  <script src="/js/privacy-banner.js"></script>
</body>
</html>
