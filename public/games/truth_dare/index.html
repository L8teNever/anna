<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6750a4" />
  <title>Wahrheit oder Pflicht – Anna</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/games/truth_dare/truth_dare.css" />
</head>
<body>
  <script src="/js/icons.js"></script>
  <div class="game-shell">
    <header class="game-topbar">
      <button class="m3-icon-button" id="back-button" aria-label="Zurück" title="Zurück">
        <svg class="m3-icon"><use href="#icon-arrow-back"></use></svg>
      </button>
      <h1 class="game-topbar__title">
        <svg class="m3-icon" style="vertical-align: -5px"><use href="#icon-masks"></use></svg>
        Wahrheit oder Pflicht
      </h1>
    </header>

    <!-- ---------- Setup-Ansicht ---------- -->
    <section class="game-view" id="setup-view">
      <h2 class="m3-title game-section-title">Mitspieler</h2>
      <div class="player-input-row">
        <input type="text" id="player-name-input" placeholder="Name hinzufügen…" maxlength="20" />
        <button type="button" class="m3-button m3-button--tonal" id="add-player-button" aria-label="Spieler hinzufügen">
          <svg class="m3-icon"><use href="#icon-add"></use></svg>
        </button>
      </div>
      <div class="player-chips" id="player-chips"></div>

      <h2 class="m3-title game-section-title">Modus</h2>
      <div class="m3-segmented" id="mode-segmented" role="group" aria-label="Modus wählen">
        <button type="button" class="m3-segmented__option" data-value="normal">Normal</button>
        <button type="button" class="m3-segmented__option" data-value="party">Party</button>
      </div>

      <div class="game-bottom-bar">
        <button type="button" class="m3-button m3-button--filled" id="start-button">Spiel starten</button>
      </div>
    </section>

    <!-- ---------- Spiel-Ansicht ---------- -->
    <section class="game-view" id="play-view" hidden>
      <div class="game-play">
        <p class="m3-label" id="turn-label">SPIELER AM ZUG</p>
        <p class="m3-headline" id="turn-name">Spieler 1</p>

        <div class="td-card" id="td-card">
          <p class="m3-body" id="td-placeholder">Wahrheit oder Pflicht wählen…</p>
          <p class="td-card__prompt" id="td-prompt" hidden></p>
        </div>

        <div class="td-choice-row" id="td-choice-row">
          <button type="button" class="m3-button m3-button--tonal" id="truth-button">Wahrheit</button>
          <button type="button" class="m3-button m3-button--filled" id="dare-button">Pflicht</button>
        </div>
      </div>
      <div class="game-bottom-bar" id="next-turn-bar" hidden>
        <button type="button" class="m3-button m3-button--filled" id="next-turn-button">Nächster Spieler</button>
      </div>
    </section>
  </div>

  <script src="/js/storage.js"></script>
  <script src="/games/truth_dare/truth_dare.js"></script>
  <script src="/js/pwa-helper.js"></script>
</body>
</html>
