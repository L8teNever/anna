<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anna – Avatar-Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0c0f17;
      --card-bg: rgba(22, 28, 45, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-glow: rgba(99, 102, 241, 0.15);
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --shape: 16px;
      --font: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(239, 68, 68, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    header {
      text-align: center;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 40%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.05rem;
    }

    /* Glassmorphic Cards */
    .glass-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--shape);
      padding: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Drag & Drop Zone */
    .upload-zone {
      border: 2px dashed rgba(99, 102, 241, 0.4);
      border-radius: var(--shape);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: rgba(99, 102, 241, 0.02);
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.06);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px var(--primary-glow);
    }

    .upload-icon {
      font-size: 3rem;
      color: var(--primary);
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .upload-text {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .upload-hint {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    #file-input {
      display: none;
    }

    /* Grid layout */
    .grid-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .grid-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }

    .avatar-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.2s ease;
    }

    .avatar-card:hover {
      transform: translateY(-4px);
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 10px 20px -10px rgba(0,0,0,0.5);
    }

    .avatar-img-wrap {
      width: 100%;
      aspect-ratio: 1/1;
      background: #111420;
      position: relative;
      overflow: hidden;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-info {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .avatar-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .delete-btn {
      width: 100%;
      padding: 8px;
      border: none;
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      font-family: inherit;
      font-weight: 700;
      font-size: 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: var(--danger);
      color: #fff;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e1b4b;
      border: 1px solid var(--primary);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Loader */
    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px;
      grid-column: 1 / -1;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Avatar-Manager</h1>
      <p class="subtitle">Lade neue Bilder hoch (Greenscreen wird automatisch entfernt) oder lösche ungenutzte Avatare.</p>
    </header>

    <!-- Upload Panel -->
    <div class="glass-panel">
      <div class="upload-zone" id="drop-zone">
        <div class="upload-icon">▲</div>
        <div class="upload-text">Bilder hierher ziehen oder klicken zum Auswählen</div>
        <div class="upload-hint">Unterstützte Formate: PNG, JPG, JPEG, WEBP. Greenscreen wird automatisch entfernt!</div>
        <input type="file" id="file-input" accept="image/*" multiple />
      </div>
    </div>

    <!-- Media Library Panel -->
    <div class="glass-panel">
      <div class="grid-header">
        <div class="grid-title">Deine Avatare</div>
      </div>
      <div class="avatar-grid" id="avatar-grid">
        <div class="loader-wrap">
          <div class="spinner"></div>
          <p>Lade Bilder...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Erfolgreich ausgeführt!</div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const avatarGrid = document.getElementById('avatar-grid');
    const toast = document.getElementById('toast');

    // Load initial list
    async function loadAvatars() {
      try {
        const res = await fetch('/api/images');
        if (!res.ok) throw new Error('Fehler beim Laden');
        const data = await res.json();
        renderGrid(data.images);
      } catch (err) {
        showToast('Fehler beim Laden der Avatare', true);
      }
    }

    function renderGrid(images) {
      avatarGrid.innerHTML = '';
      if (!images || images.length === 0) {
        avatarGrid.innerHTML = '<div class="empty-state"><h3>Keine Avatare vorhanden</h3><p>Lade oben deine ersten Bilder hoch!</p></div>';
        return;
      }

      images.forEach(url => {
        const filename = url.split('/').pop();
        const card = document.createElement('div');
        card.className = 'avatar-card';
        card.innerHTML = `
          <div class="avatar-img-wrap">
            <img class="avatar-img" src="${url}" alt="Avatar">
          </div>
          <div class="avatar-info">
            <div class="avatar-name" title="${filename}">${filename}</div>
            <button class="delete-btn" onclick="deleteAvatar('${filename}')">
              Löschen
            </button>
          </div>
        `;
        avatarGrid.appendChild(card);
      });
    }

    async function deleteAvatar(filename) {
      if (!confirm(`Möchtest du das Bild "${filename}" wirklich löschen?`)) return;

      try {
        const res = await fetch(`/api/images/${encodeURIComponent(filename)}`, {
          method: 'DELETE'
        });
        if (res.ok) {
          showToast('Avatar erfolgreich gelöscht');
          loadAvatars();
        } else {
          showToast('Fehler beim Löschen des Avatars', true);
        }
      } catch (err) {
        showToast('Netzwerkfehler beim Löschen', true);
      }
    }

    // Handle Uploads
    async function uploadFiles(files) {
      if (files.length === 0) return;

      avatarGrid.innerHTML = `
        <div class="loader-wrap">
          <div class="spinner"></div>
          <p>Verarbeite Bilder und entferne Greenscreen...</p>
        </div>
      `;

      const formData = new FormData();
      for (let i = 0; i < files.length; i++) {
        formData.append('files', files[i]);
      }

      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        if (res.ok) {
          const data = await res.json();
          showToast(`Erfolgreich ${files.length} Bild(er) verarbeitet`);
          renderGrid(data.images);
        } else {
          showToast('Fehler beim Hochladen oder Verarbeiten', true);
          loadAvatars();
        }
      } catch (err) {
        showToast('Netzwerkfehler beim Hochladen', true);
        loadAvatars();
      }
    }

    // Trigger click on upload zone
    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      uploadFiles(e.target.files);
    });

    // Drag-and-Drop handling
    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
      }, false);
    });

    dropZone.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      uploadFiles(files);
    });

    // Helper: Show Toast
    function showToast(message, isError = false) {
      toast.innerText = message;
      toast.style.borderColor = isError ? 'var(--danger)' : 'var(--primary)';
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Initial load
    loadAvatars();
  </script>
</body>
</html>
