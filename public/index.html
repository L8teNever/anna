<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6750a4" />
  <title>Anna – Partyspiele</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <script src="/js/icons.js"></script>
  <header class="app-topbar">
    <div class="m3-search">
      <span class="m3-search__icon"><svg class="m3-icon"><use href="#icon-search"></use></svg></span>
      <input id="search-input" type="search" placeholder="Spiele suchen…" aria-label="Spiele suchen" />
    </div>
    <button class="m3-icon-button" id="settings-button" aria-label="Einstellungen" title="Einstellungen">
      <svg class="m3-icon"><use href="#icon-settings"></use></svg>
    </button>
  </header>

  <main class="app-content">
    <h1 class="m3-headline">Anna</h1>
    <p class="m3-body">Wähle ein Spiel für deine Runde – alles läuft direkt auf euren Handys, auch offline.</p>

    <div class="game-grid" id="game-grid"></div>
    <p class="m3-empty" id="empty-state" hidden>Kein Spiel gefunden.</p>
  </main>

  <script src="/js/storage.js"></script>
  <script src="/js/game-registry.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/pwa-helper.js"></script>
</body>
</html>
