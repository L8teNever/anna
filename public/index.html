<!doctype html>
<html lang="de">
<head>
  <meta name="cf-worker-bypass" content="true" />
  <meta charset="utf-8" />
  <meta name="cf-cache-bust" content="true" />
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("anna:settings") || "{}");
        if (s.theme === "light" || s.theme === "dark") document.documentElement.dataset.theme = s.theme;
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1014" />
  <title>Anna – Partyspiele</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="/css/material.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <!-- Session-globale Scripts: laufen EINMALIG pro echtem Seitenaufruf,
       nie erneut bei einem Router-Seitenwechsel (siehe router.js). Bewusst
       NICHT defer/async, damit sie synchron VOR allen <body>-Scripts
       fertig sind (window.Router muss für diese existieren). -->
  <script src="/js/icons.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/page-transition.js"></script>
  <script src="/js/pwa-helper.js"></script>
</head>
<body>
  <div class="app-shell">
    <!-- ---------- Header mit Morph-Suche ---------- -->
    <header class="app-topbar" id="app-topbar">
      <div class="app-topbar__title-wrap">
        <div class="app-topbar__title">Anna</div>
        <div class="app-topbar__search">
          <div class="m3-search" style="height: 100%">
            <span class="m3-search__icon"><svg class="m3-icon"><use href="#icon-search"></use></svg></span>
            <input id="search-input" type="search" placeholder="Spiel suchen…" aria-label="Spiele suchen" />
            <button type="button" class="m3-icon-button" id="clear-search-button" style="width: 40px; height: 40px" hidden>
              <svg class="m3-icon" style="width: 18px; height: 18px"><use href="#icon-close"></use></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="app-topbar__actions">
        <button type="button" class="m3-icon-button" id="filter-toggle-button" aria-label="Filter öffnen" title="Filter öffnen" style="display: none;">
          <svg class="m3-icon"><use href="#icon-sliders"></use></svg>
        </button>
        <button type="button" class="m3-icon-button" id="search-trigger-button" aria-label="Suche öffnen" title="Suche öffnen" style="color: var(--m3-primary)">
          <svg class="m3-icon"><use href="#icon-search"></use></svg>
        </button>
        <button type="button" class="m3-icon-button app-topbar__action-btn" id="settings-button" aria-label="Einstellungen" title="Einstellungen">
          <span id="action-icon-settings">
            <svg class="m3-icon"><use href="#icon-settings"></use></svg>
          </span>
          <span id="action-icon-close">
            <svg class="m3-icon"><use href="#icon-close"></use></svg>
          </span>
        </button>
      </div>
    </header>

    <!-- ---------- Filter-Panel ---------- -->
    <div class="filter-panel" id="filter-panel">
      <div class="filter-panel__row">
        <div class="filter-panel__row-label">
          <svg class="m3-icon" style="width: 16px; height: 16px; color: #f36c8a" fill="#f36c8a"><use href="#icon-heart"></use></svg>
          Nur Favoriten anzeigen
        </div>
        <label class="m3-switch">
          <input type="checkbox" id="fav-filter-toggle" />
          <span class="m3-switch__track"></span>
        </label>
      </div>
      <div class="filter-panel__group">
        <span class="filter-panel__group-title">Spieleranzahl</span>
        <div class="filter-panel__chips" id="player-chips-container">
          <button type="button" class="m3-chip" data-value="all" aria-pressed="true">Alle</button>
          <button type="button" class="m3-chip" data-value="1">1 Spieler</button>
          <button type="button" class="m3-chip" data-value="2">2 Spieler</button>
          <button type="button" class="m3-chip" data-value="4">4 Spieler</button>
          <button type="button" class="m3-chip" data-value="8">8+ Spieler</button>
        </div>
      </div>
    </div>

    <!-- ---------- Spiele-Grid ---------- -->
    <main>
      <p class="m3-empty" id="empty-state" hidden>
        <svg class="m3-icon" style="width: 36px; height: 36px; color: var(--m3-on-surface-variant)"><use href="#icon-info"></use></svg>
        <span>Keine Ergebnisse</span>
        <button type="button" class="m3-button m3-button--text" id="reset-search-button">Suche zurücksetzen</button>
      </p>
      <div class="game-grid" id="game-grid"></div>
    </main>
  </div>

  <script src="/js/version.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/game-registry.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/ripple.js"></script>
  <script src="/js/cache-tools.js"></script>
  <script src="/js/touch-fixes.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/privacy-banner.js"></script>
</body>
</html>
